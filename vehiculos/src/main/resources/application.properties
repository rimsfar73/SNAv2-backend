#  CONFIGURACIėN DEL SERVICIO
spring.application.name=vehiculos
server.port=8083

#  BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/db_vehiculos?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#  FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#  EUREKA CLIENT
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

#  JWT
jwt.secret=MiClaveUltraSecretaParaVehiculos1234567890

