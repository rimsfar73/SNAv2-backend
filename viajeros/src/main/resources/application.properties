# CONFIGURACIėN DEL SERVICIO
spring.application.name=viajeros
server.port=8082

# BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/db_viajeros?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# EUREKA CLIENT
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# JWT
jwt.secret=ClaveUltraSeguraViajeros_1234567890_ABCDEF

# LOGGING
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.example.viajeros=DEBUG